<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=\, initial-scale=1.0">
    <!-- <link rel="stylesheet" href="style.css"> -->
     <style>
    body {
        background: #f4f7f6;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        justify-content: center;
        padding-top: 50px;
        margin: 0;
    }
   
    label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #555;
    }
    input[type="text"], textarea {
        width: 100%;
        padding: 12px;
        margin-bottom: 20px;
        border: 1px solid #ddd;
        border-radius: 6px;
        box-sizing: border-box; /* Ensures padding doesn't break width */
        font-size: 14px;
        outline: none;
        transition: border-color 0.3s;
    }
    input:focus, textarea:focus {
        border-color: #007bff;
    }
    button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        font-size: 16px;
        transition: 0.3s;
    }
    button[type="submit"] {
        background: #28a745;
        color: white;
    }
    button[type="button"] {
        background: #6c757d;
        color: white;
        margin-bottom: 15px;
        width: auto; /* Home button doesn't need to be full width */
        padding: 8px 15px;
        font-size: 14px;
    }
    button:hover {
        opacity: 0.9;
        transform: translateY(-1px);
    }
</style>
    <title>Document</title>
</head>
<body>
    <div>
        <form action="https://notes-application-965a.onrender.com/form" method="POST">
            <a href="https://notes-application-965a.onrender.com/"><button type="button">Home</button></a>
            <br>
            <label for="title">Title : </label>
           <input type="text" name="title" placeholder="Enter the title">
           <br>
        
            <!-- <label for="title"></label> -->
             <label for="title">Description : </label>
            <textarea type="text" rows="10" cols="30" name="desc" placeholder="Enter the description"></textarea>
            <br>
            <button type="submit">Submit</button>
        </form>
    </div>

</body>
</html>
